name: Build Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Slack - Build Started
        shell: bash
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            -d "{\"text\":\":construction: *Build Started*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions>\"}"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        id: build
        run: wails build -clean

      - name: Rename output
        run: |
          $version = if ("${{ github.ref_name }}" -match "^v.*") { "${{ github.ref_name }}" } else { "latest" }
          mv build/bin/analyze-log.exe "analyze-log-windows-$version.exe"
          echo "OUTPUT=analyze-log-windows-$version.exe" >> $env:GITHUB_ENV
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload artifact for signing
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: analyze-log-windows-${{ env.VERSION }}
          path: ${{ env.OUTPUT }}

      - name: Submit to SignPath for signing
        if: startsWith(github.ref, 'refs/tags/v')
        uses: SignPath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: '${{ secrets.SIGNPATH_PROJECT_SLUG }}'
          signing-policy-slug: '${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}'
          artifact-configuration-slug: '${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}'
          github-artifact-id: '${{ steps.upload.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: './signed-artifacts'

      - name: Upload unsigned artifact (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: analyze-log-windows
          path: ${{ env.OUTPUT }}

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ./signed-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack - Build Success
        if: success()
        shell: bash
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]; then
            OUTPUT="./signed-artifacts/*"
          else
            OUTPUT="${{ env.OUTPUT }}"
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":white_check_mark: *Build Success*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Output:* $OUTPUT\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Actions>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack - Build Failed
        if: failure()
        shell: bash
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":x: *Build Failed*\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\nLog: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
