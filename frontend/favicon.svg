<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="url(#grad)"/>
  <g fill="white" opacity="0.9">
    <!-- Document icon -->
    <rect x="8" y="6" width="16" height="20" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <!-- Lines representing log entries -->
    <rect x="11" y="10" width="10" height="2" rx="1"/>
    <rect x="11" y="14" width="8" height="2" rx="1"/>
    <rect x="11" y="18" width="6" height="2" rx="1"/>
    <!-- Search magnifier -->
    <circle cx="22" cy="22" r="5" fill="none" stroke="white" stroke-width="2"/>
    <line x1="26" y1="26" x2="29" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
